<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workers AI Sidepanel</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-page">
    <header>
      <div>
        <h1>Workers AI</h1>
        <span id="model-label">Not configured</span>
        <select id="model-select" class="model-select" aria-label="Model">
          <option value="@cf/zai-org/glm-5.2">GLM 5.2</option>
          <option value="@cf/moonshotai/kimi-k2.7-code">Kimi K2.7 Code</option>
        </select>
      </div>
      <div class="header-actions">
        <button id="add-page" class="page-button" title="Include the current page in this chat">＋ Page</button>
        <button id="clear" class="icon-button" title="Clear conversation" aria-label="Clear conversation">↺</button>
        <button id="settings" class="icon-button" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </header>
    <main id="messages" aria-live="polite"></main>
    <form id="chat-form">
      <div id="page-context-bar" class="page-context-bar" hidden>
        <span id="page-context-label"></span>
        <button id="vision-page" type="button" aria-pressed="false">Vision off</button>
        <button id="control-page" type="button" aria-pressed="false">Control off</button>
        <button id="remove-page" type="button">Remove</button>
      </div>
      <div class="branch-controls" aria-label="Conversation branches">
        <button id="branch-prev" class="icon-button" type="button" title="Previous branch" aria-label="Previous branch">‹</button>
        <span id="branch-label">Branch 1/1</span>
        <button id="branch-next" class="icon-button" type="button" title="Next branch" aria-label="Next branch">›</button>
      </div>
      <label class="sr-only" for="prompt">Message</label>
      <textarea id="prompt" rows="3" placeholder="Message Workers AI…" required></textarea>
      <div class="composer-row">
        <span class="hint">Enter to send · Shift+Enter for newline</span>
        <button id="stop" class="secondary-button" type="button" hidden>Stop</button>
        <button id="send" type="submit">Send</button>
      </div>
    </form>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
